<style>
body{
  margin:0;
  background:#050807;
  color:white;
  font-family: 'Segoe UI', sans-serif;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
  width:20px;
  height:20px;
  border:2px solid #B6FF3C;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.1s;
  z-index:999;
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

/* TEXT */
.glow-text{
  background:linear-gradient(90deg,#fff,#B6FF3C,#fff);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTON */
.btn{
  padding:12px 25px;
  border-radius:10px;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px #B6FF3C;
}

/* CARD */
.card{
  position:relative;
  overflow:hidden;
  cursor:pointer;
}

.card video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.4s;
}

.card img{
  transition:0.4s;
}

.card:hover video{
  opacity:1;
}

.card:hover img{
  opacity:0;
}

/* SCROLL ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center">
  <div class="w-[90%] max-w-3xl">
    <button onclick="closeVideo()" class="mb-4 text-white">Close ✖</button>
    <iframe id="frame" class="w-full h-[500px] rounded-xl"></iframe>
  </div>
</div>

<script>
function openVideo(link){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("frame").src = link;
}
function closeVideo(){
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("frame").src = "";
}
</script>

<script>

/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* LOADER */
window.onload=()=>{
document.getElementById("loader").style.display="none";
};

/* SCROLL */
const reveals=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
reveals.forEach(r=>{
const top=r.getBoundingClientRect().top;
if(top<window.innerHeight-100){
r.classList.add("active");
}
});
});

</script>
